name = "danielwebsite"
compatibility_date = "2026-04-22"

# Keep Cloudflare deployment settings consistent.
[observability]
enabled = false

# D1 migrations live here (Wrangler v4).
migrations_dir = "migrations"

# D1 database binding (Wrangler v4 expects an array).
[[d1_databases]]
binding = "DB"
database_name = "daniels_detailers"
database_id = "REPLACE_ME"

